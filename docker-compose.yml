version: '3.8'

services:
  backend:
    build: ./backend
    container_name: pixel-heart-backend
    ports:
      - "8000:8000"
    environment:
      # LLM Configuration
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - USE_MOCK_LLM=${USE_MOCK_LLM:-True}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - STEPFUN_API_KEY=${STEPFUN_API_KEY}
      - STEPFUN_BASE_URL=${STEPFUN_BASE_URL:-https://api.stepfun.com}
      - LLM_MODEL=${LLM_MODEL:-claude-3-5-sonnet-20241022}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-4000}
      # Database
      - DATABASE_URL=sqlite+aiosqlite:///./pixel_heart.db
      - CHROMA_DB_PATH=./chroma_db
      # API
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=True
      - ALLOWED_ORIGINS=["http://localhost:5173","http://localhost:80"]
      # Logging
      - LOG_LEVEL=INFO
    volumes:
      - ./backend/data:/app/data
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/logs:/app/logs
    command: >
      sh -c "
        python -m database.init &&
        uvicorn main:app --host 0.0.0.0 --port 8000
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: pixel-heart-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  chroma_db:
  data:
