<!DOCTYPE html>
<html lang="zh-CN" data-sveltekit-preload-data="hover">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
      /* Global pixel art styles */
      :root {
        --bg-dark: #0d0d1a;
        --bg-mid: #12122a;
        --bg-card: #1a1a35;
        --border: #3a3a6a;
        --accent-1: #ff6eb4;
        --accent-2: #7b61ff;
        --accent-3: #00e5ff;
        --accent-4: #ffe066;
        --accent-5: #4dff91;
        --text-main: #e8e8ff;
        --text-dim: #8888bb;
        --pixel-size: 4px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        background-color: var(--bg-dark);
        color: var(--text-main);
        font-family: 'Share Tech Mono', monospace;
        font-size: 14px;
        line-height: 1.7;
        overflow-x: hidden;
      }

      body {
        min-height: 100vh;
      }

      /* Scanline overlay */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.08) 2px,
          rgba(0, 0, 0, 0.08) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }

      /* Pixel box utility */
      .pixel-box {
        border: var(--pixel-size) solid var(--border);
        box-shadow: var(--pixel-size) var(--pixel-size) 0 #000;
        background: var(--bg-card);
        padding: 1.5rem;
      }

      .pixel-box-accent {
        border-color: var(--accent-2);
        box-shadow: var(--pixel-size) var(--pixel-size) 0 var(--accent-2);
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
